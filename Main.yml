name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: rohitkumarrai7
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push to output branch
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin output || echo "Branch does not exist yet"
          git checkout output 2>/dev/null || git checkout -b output
          git pull origin output --allow-unrelated-histories || true
          cp dist/github-contribution-grid-snake.svg .
          git add github-contribution-grid-snake.svg
          git commit -m "Generate snake animation [skip ci]" --allow-empty || true
          git push origin output -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}